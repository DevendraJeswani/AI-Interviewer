[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://ai-interviewer-mz3b.onrender.com"

# Rewrite all routes to index.html so React Router (or any client-side nav) works
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
